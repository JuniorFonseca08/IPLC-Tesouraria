services:
  - type: web
    name: tesouraria-igreja
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        value: tesoureiro
      - key: ADMIN_PASSWORD_HASH
        sync: false   # preencher manualmente no dashboard do Render
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false   # colar o JSON da service account
      - key: SPREADSHEET_ID
        sync: false   # ID da planilha
      - key: FLASK_DEBUG
        value: "true"
    healthCheckPath: /
