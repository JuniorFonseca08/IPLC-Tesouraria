<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Tesouraria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body class="login-page">
  <div class="login-card">
    <span class="brand-cross">✝</span>
    <h2>Tesouraria</h2>
    <p class="text-center text-muted mb-4" style="font-size:.95rem;">
      Igreja Presbiteriana em Loteamento Conceição<br>
    </p>

    {% if error %}
    <div class="alert alert-danger py-2 px-3 mb-3" style="font-size:.88rem;">
      <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-600" style="font-size:.85rem;">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="tesoureiro" required autofocus />
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600" style="font-size:.85rem;">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required />
        </div>
      </div>
      <button type="submit" class="btn btn-primary-green w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
